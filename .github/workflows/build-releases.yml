name: Build OpenWrt LuCI & Core Package (Fixed URL)

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'Pilih Versi Basis OpenWrt'
        required: true
        default: '23.05.5'
        type: choice
        options:
          - '23.05.5'
          - '23.05.0'
          - '24.10.0'
          - 'snapshots'

jobs:
  build_dual_packages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          # Menghapus python3-distutils untuk menghindari error paket kosong di Ubuntu baru
          sudo apt-get install -y build-essential gawk gcc-multilib gettext git libncurses-dev libssl-dev rsync unzip zlib1g-dev file wget python3-setuptools

      - name: Download x86_64 SDK
        run: |
          VERSION="${{ github.event.inputs.openwrt_version }}"
          
          # Memperbaiki susunan URL unduhan OpenWrt SDK yang valid
          if [ "$VERSION" = "snapshots" ]; then
            SDK_URL="https://archive.openwrt.org/releases/25.12.0/targets/armsr/armv8/openwrt-sdk-25.12.0-armsr-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          else
            SDK_URL="https://archive.openwrt.org/releases/25.12.0/targets/armsr/armv8/openwrt-sdk-25.12.0-armsr-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          fi
          
          echo "Mengunduh SDK dari alamat resmi: $SDK_URL"
          SDK_FILE=$(wget -qO- "$SDK_URL" | grep -oE 'openwrt-sdk-[^"]+\.tar\.xz' | head -n 1)
          
          if [ -z "$SDK_FILE" ]; then
            echo "ERROR: SDK Tidak ditemukan di server OpenWrt!"
            exit 1
          fi
          
          wget "${SDK_URL}${SDK_FILE}"
          tar -xf "$SDK_FILE"
          mv openwrt-sdk-* openwrt-sdk

      - name: Inject Custom Packages to SDK
        run: |
          # 1. Salin aplikasi GUI milik Anda
          mkdir -p openwrt-sdk/package/luci-app-modemdata
          if [ -d "luci-app-modemdata" ]; then
            cp -r luci-app-modemdata/* openwrt-sdk/package/luci-app-modemdata/
          else
            cp -r * openwrt-sdk/package/luci-app-modemdata/ 2>/dev/null || true
          fi

          # 2. Ambil otomatis paket CORE inti (modemdata) dari repositori hulu obsy
          git clone https://github.com openwrt-sdk/package/modemdata

      - name: Update and Install Feeds
        run: |
          cd openwrt-sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure and Compile Packages
        run: |
          cd openwrt-sdk
          make defconfig
          # Proses kompilasi ganda untuk aplikasi inti dan interface webnya
          make package/modemdata/compile V=s -j$(nproc)
          make package/luci-app-modemdata/compile V=s -j$(nproc)

      - name: Prepare Files for Release
        run: |
          mkdir -p output_packages
          # Kumpulkan seluruh berkas berekstensi .ipk atau .apk yang berhasil diciptakan
          find openwrt-sdk/bin/ -type f \( -name "*modemdata*.ipk" -o -name "*modemdata*.apk" \) -exec cp {} output_packages/ \;
          echo "Daftar berkas yang siap diunggah ke rilis:"
          ls -l output_packages/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.31-release-${{ github.run_number }}"
          name: "Modemdata Pack Complete - OpenWrt ${{ github.event.inputs.openwrt_version }}"
          body: |
            Paket Komplit Universal (Architecture-Independent) siap pakai.
            
            **Petunjuk Pemasangan pada Router:**
            1. Unduh paket `modemdata` dan `luci-app-modemdata` di bawah.
            2. Unggah ke dalam router, lalu ketik perintah berurutan:
               ```bash
               opkg update
               opkg install modemdata_*
               opkg install luci-app-modemdata_*
               ```
            - **Dibuat dengan Basis**: OpenWrt SDK ${{ github.event.inputs.openwrt_version }}
            - File ini kompetibel langsung untuk arsitektur **x86_64**, **aarch64**, mips, ramips, dll.
          draft: false
          prerelease: false
          files: |
            output_packages/*
