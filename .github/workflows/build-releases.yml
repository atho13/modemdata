name: FrdmX Build

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'Pilih Versi Basis OpenWrt'
        required: true
        default: '23.05.5'
        type: choice
        options:
          - '23.05.5'
          - '23.05.0'
          - '24.10.0'
          - 'snapshots'

jobs:
  build_dual_packages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gawk gcc-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget

      - name: Download x86_64 SDK
        run: |
          VERSION="${{ github.event.inputs.openwrt_version }}"
          if [ "$VERSION" = "snapshots" ]; then
            SDK_URL="https://openwrt.org"
          else
            SDK_URL="https://openwrt.org{VERSION}/targets/x86/64/"
          fi
          
          echo "Mengunduh SDK dari: $SDK_URL"
          SDK_FILE=$(wget -qO- "$SDK_URL" | grep -oE 'openwrt-sdk-[^"]+\.tar\.xz' | head -n 1)
          
          if [ -z "$SDK_FILE" ]; then
            echo "ERROR: SDK Tidak ditemukan!"
            exit 1
          fi
          
          wget "${SDK_URL}${SDK_FILE}"
          tar -xf "$SDK_FILE"
          mv openwrt-sdk-* openwrt-sdk

      - name: Inject Custom Packages to SDK
        run: |
          mkdir -p openwrt-sdk/package/luci-app-modemdata
          if [ -d "luci-app-modemdata" ]; then
            cp -r luci-app-modemdata/* openwrt-sdk/package/luci-app-modemdata/
          else
            cp -r * openwrt-sdk/package/luci-app-modemdata/ 2>/dev/null || true
          fi

          # 2. Ambil otomatis paket CORE inti (modemdata) langsung dari repo hulu obsy / eko.one.pl
          git clone https://github.com openwrt-sdk/package/modemdata

      - name: Update and Install Feeds
        run: |
          cd openwrt-sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure and Compile Packages
        run: |
          cd openwrt-sdk
          make defconfig
          # Melakukan kompilasi berurutan untuk kedua paket tersebut
          make package/modemdata/compile V=s -j$(nproc)
          make package/luci-app-modemdata/compile V=s -j$(nproc)

      - name: Prepare Files for Release
        run: |
          mkdir -p output_packages
          # Mencari dan mengumpulkan semua file .ipk atau .apk dari kedua paket di atas
          find openwrt-sdk/bin/ -type f \( -name "*modemdata*.ipk" -o -name "*modemdata*.apk" \) -exec cp {} output_packages/ \;
          echo "Hasil kompilasi paket ganda:"
          ls -l output_packages/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.31-release-${{ github.run_number }}"
          name: "Modemdata Complete Pack - OpenWrt ${{ github.event.inputs.openwrt_version }}"
          body: |
            Paket Komplit Universal (Architecture-Independent) siap pakai.
            
            **Cara Instalasi di Router:**
            1. Unduh kedua file di bawah (`modemdata` dan `luci-app-modemdata`).
            2. Unggah ke router, lalu jalankan instalasi berurutan:
               ```bash
               opkg update
               opkg install modemdata_*
               opkg install luci-app-modemdata_*
               ```
            - **Basis Sistem**: OpenWrt ${{ github.event.inputs.openwrt_version }}
            - File ini kompetibel langsung untuk arsitektur **x86_64**, **aarch64**, mips, dll.
          draft: false
          prerelease: false
          files: |
            output_packages/*
