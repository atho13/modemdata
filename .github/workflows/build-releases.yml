name: Build OpenWrt LuCI & Core Package (Absolute URL Fixed)

on:
  workflow_dispatch:

jobs:
  build_dual_packages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gawk gcc-multilib gettext git libncurses-dev libssl-dev rsync unzip zlib1g-dev file wget python3-setuptools zstd

      - name: Download OpenWrt SDK
        run: |
          # Mengunci URL ke file biner asli agar tidak mengunduh halaman web HTML
          SDK_URL="https://archive.openwrt.org/releases/25.12.0/targets/armsr/armv8/openwrt-sdk-25.12.0-armsr-armv8_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          
          echo "Mengunduh SDK dari alamat resmi: $SDK_URL"
          wget -O openwrt-sdk.tar.zst "$SDK_URL"
          
          # Ekstrak file biner .tar.zst menggunakan zstd
          zstd -d openwrt-sdk.tar.zst
          tar -xf openwrt-sdk.tar
          
          # Merapikan struktur nama folder target SDK
          mv openwrt-sdk-25.12.0-* openwrt-sdk

      - name: Inject Custom Packages to SDK
        run: |
          mkdir -p openwrt-sdk/package/luci-app-modemdata
          mkdir -p openwrt-sdk/package/modemdata

          # 1. Salin GUI dari kode repositori Anda saat ini
          if [ -d "luci-app-modemdata" ]; then
            cp -r luci-app-modemdata/* openwrt-sdk/package/luci-app-modemdata/
          else
            cp -r * openwrt-sdk/package/luci-app-modemdata/ 2>/dev/null || true
          fi

          # 2. Ambil otomatis paket CORE dari repositori obsy
          rm -rf tmp_modemdata
          git clone https://github.com tmp_modemdata
          cp -r tmp_modemdata/* openwrt-sdk/package/modemdata/

      - name: Update and Install Feeds
        run: |
          cd openwrt-sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure and Compile Packages
        run: |
          cd openwrt-sdk
          make defconfig
          # Proses kompilasi inti backend dan tampilan frontend web LuCI
          make package/modemdata/compile V=s -j$(nproc)
          make package/luci-app-modemdata/compile V=s -j$(nproc)

      - name: Prepare Files for Release
        run: |
          mkdir -p output_packages
          find openwrt-sdk/bin/ -type f \( -name "*modemdata*.ipk" -o -name "*modemdata*.apk" \) -exec cp {} output_packages/ \;
          echo "Daftar berkas kemasan yang siap diterbitkan:"
          ls -l output_packages/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.31-release-${{ github.run_number }}"
          name: "Modemdata Complete Pack - OpenWrt 25.12.0"
          body: |
            Paket Komplit Universal (Architecture-Independent) siap pakai untuk OpenWrt versi baru.
            
            **Petunjuk Pemasangan pada Perangkat Router:**
            1. Unduh kedua file di bawah (`modemdata` dan `luci-app-modemdata`).
            2. Transfer berkas ke dalam router, lalu eksekusi instalasi secara berurutan:
               ```bash
               opkg update
               opkg install modemdata_*
               opkg install luci-app-modemdata_*
               ```
            - **Basis Pembuatan**: OpenWrt SDK 25.12.0 (`armsr/armv8`)
            - Berkas ini berstatus universal, langsung cocok dipasang pada arsitektur **x86_64**, **aarch64**, mips, ramips, dll.
          draft: false
          prerelease: false
          files: |
            output_packages/*
