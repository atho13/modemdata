name: Luci Modemdata 

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'Pilih Versi Basis OpenWrt'
        required: true
        default: '23.05.5'
        type: choice
        options:
          - '23.05.5'
          - '23.05.0'
          - '24.10.0'
          - 'snapshots'

jobs:
  build_universal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gawk gcc-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: Download x86_64 SDK
        run: |
          VERSION="${{ github.event.inputs.openwrt_version }}"
          if [ "$VERSION" = "snapshots" ]; then
            SDK_URL="https://openwrt.org"
          else
            SDK_URL="https://openwrt.org{VERSION}/targets/x86/64/"
          fi
          
          echo "Mengunduh SDK dari: $SDK_URL"
          SDK_FILE=$(wget -qO- "$SDK_URL" | grep -oE 'openwrt-sdk-[^"]+\.tar\.xz' | head -n 1)
          
          if [ -z "$SDK_FILE" ]; then
            echo "ERROR: SDK Tidak ditemukan!"
            exit 1
          fi
          
          wget "${SDK_URL}${SDK_FILE}"
          tar -xf "$SDK_FILE"
          mv openwrt-sdk-* openwrt-sdk

      - name: Inject Custom Package to SDK
        run: |
          mkdir -p openwrt-sdk/package/luci-app-modemdata
          if [ -d "luci-app-modemdata" ]; then
            cp -r luci-app-modemdata/* openwrt-sdk/package/luci-app-modemdata/
          else
            cp -r * openwrt-sdk/package/luci-app-modemdata/ 2>/dev/null || true
          fi

      - name: Update and Install Feeds
        run: |
          cd openwrt-sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure and Compile Package
        run: |
          cd openwrt-sdk
          make defconfig
          make package/luci-app-modemdata/compile V=s -j$(nproc)

      - name: Prepare Files for Release
        run: |
          mkdir -p output_packages
          # Kumpulkan semua file hasil kompilasi (.ipk atau .apk) ke satu folder khusus
          find openwrt-sdk/bin/ -type f \( -name "*.ipk" -o -name "*.apk" \) -exec cp {} output_packages/ \;
          echo "Daftar file yang siap dirilis:"
          ls -l output_packages/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.31-build-${{ github.run_number }}"
          name: "LuCI Modemdata Universal - OpenWrt ${{ github.event.inputs.openwrt_version }}"
          body: |
            Paket Universal (Architecture-Independent) hasil kompilasi otomatis.
            - **Basis SDK**: OpenWrt ${{ github.event.inputs.openwrt_version }}
            - **Tanggal Build**: ${{ github.event.repository.updated_at }}
            - File ini dapat langsung dipasang di arsitektur **x86_64**, **aarch64**, dll.
          draft: false
          prerelease: false
          files: |
            output_packages/*
